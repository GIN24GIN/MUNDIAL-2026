<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipo - Mundial 2026 AR</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Librería para modelos 3D -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
</head>
<body>
  <nav class="navbar">
    <img src="logo.jpg" alt="Logo App" class="logo">
    <h1 class="app-name">Mundial 2026 AR</h1>
  </nav>

  <main>
    <h1 id="equipo-nombre" class="section-title"></h1>

    <!-- Logo/Modelo 3D -->
    <div class="stadium-view">
      <model-viewer id="equipo-modelo" src="" alt="Logo del equipo" auto-rotate camera-controls></model-viewer>
    </div>

    <!-- Jugadores -->
    <div id="jugadores" class="cards-container"></div>
  </main>

  <footer class="footer">
    <p>Diana Patricia Del Angel Del Angel, Jennider Carly Garcia Saldana</p>
  </footer>

  <script src="equipo.js"></script>
</body>
</html>
