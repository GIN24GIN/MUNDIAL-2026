<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial 2026 AR</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Fuente Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto&display=swap" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- Íconos FontAwesome -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <img src="logo.jpg" alt="Logo App" class="logo">
    <h1 class="app-name">Mundial 2026</h1>
    <div class="search-container">
      <input type="text" placeholder="Buscar..." class="search-bar">
      <i class="fas fa-search search-icon"></i>
    </div>
  </nav>

  <!-- Carrusel principal -->
  <main>
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <!-- Slide Estadios -->
        <div class="swiper-slide">
          <div class="card estadio">
            <img src="Estadio.jpg" alt="Estadios" class="card-img">
            <h2>Estadios</h2>
            <p>Explora los estadios y partidos del Mundial 2026.</p>
            <a href="estadios.html"><button class="btn">Ver más</button></a>
          </div>
        </div>

        <!-- Slide Equipos -->
        <div class="swiper-slide">
          <div class="card equipos">
            <img src="equipos.jpg" alt="Equipos" class="card-img">
            <h2>Equipos</h2>
            <p>Escanea logos y tarjetas coleccionables.</p>
            <a href="equipos.html"><button class="btn">Ver más</button></a>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="card historia">
            <img src="historia.jpg" alt="Historia" class="card-img">
            <h2>Historia</h2>
            <p>Revive los mundiales con videos y filtros.</p>
            <a href="historia.html"><button class="btn">Ver más</button></a>
          </div>
        </div>

      <!-- Flechas -->
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>

      <!-- Paginación -->
      <div class="swiper-pagination"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Diana Patricia Del Angel Del Angel - Jennifer Carly Garcia Saldana</p>
  </footer>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <!-- Inicialización del carrusel -->
  <script>
    var swiper = new Swiper(".mySwiper", {
      slidesPerView: 1,
      spaceBetween: 20,
      loop: true,
      pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      breakpoints: {
        768: { slidesPerView: 2 }, // tablet
        1024: { slidesPerView: 3 } // desktop
      }
    });
  </script>
</body>
</html>
