    body {
  background-image: url('assets/fondo_mundial.jpg');
  background-size: cover;       /* Esto hace que la imagen cubra toda la pantalla */
  background-position: center;  /* Centra la imagen */
  background-attachment: fixed; /* El fondo se queda quieto mientras haces scroll */
  background-repeat: no-repeat; /* Evita que la imagen se repita como mosaico */
}
    /* Crucial para que no se vea azul: la escena DEBE ser transparente */
    a-scene { display: block; position: relative; height: 100%; width: 100%; }
    
    .ar-window {
      width: 100%; height: 450px; position: relative; margin: 20px 0;
      border-radius: 15px; overflow: hidden; display: none; 
      border: 3px solid #ed1c24; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    /* Forzamos que el video de la cámara esté detrás de todo */
    .ar-window video {
      position: absolute !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important; object-fit: cover !important; z-index: 1 !important;
    }
    /* El canvas de A-Frame debe estar sobre el video pero ser transparente */
    .a-canvas { position: absolute !important; z-index: 2 !important; }

    .mindar-ui-scanning { z-index: 10 !important; }
    .section-title { text-align: center; margin-top: 20px; color: #004687; }
    .controles-ar { display: none; justify-content: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
    .btn-anim { padding: 10px 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; }
    .card-img { width: 100%; border-radius: 10px; }
    .card { padding: 15px; background: white; border-radius: 15px; text-align: center; }

          /* Esto controla que todas las imágenes de los botones tengan el mismo tamaño */
      .btn-icon {
        width: 30px;  /* Tamaño fijo para que no salgan gigantes */
        height: 30px; /* Mismo alto para que sea cuadrada */
        object-fit: contain; /* Evita que la imagen se deforme */
      }

      /* Ajuste para que el botón se vea como una "cápsula" ordenada */
      .btn-anim {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px; /* Espacio exacto entre la imagen y el texto */
        padding: 10px 20px;
        border-radius: 12px;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s; /* Un pequeño efecto al hacer clic */
      }

      .btn-anim:active {
        transform: scale(0.95); /* Se encoge un poquito al presionarlo */
      }
  </style>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const sceneEl = document.querySelector("a-scene");
    const btnAr = document.getElementById("btn-ar");

    // Fix visual para modelos
    const fixModel = (el) => {
        const obj = el.getObject3D('mesh');
        if (obj) {
            obj.traverse((node) => {
                if (node.isMesh) {
                    node.frustumCulled = false;
                    node.material.side = 2;
                }
            });
        }
    };

    // Función para lanzar confeti dinámico (Independiente)
    const lanzarConfeti = () => {
        document.querySelectorAll(".contenedor-confeti").forEach(contenedor => {
            const confeti = document.createElement("a-entity");
            
            // Configuramos el sistema de partículas directamente
            confeti.setAttribute("particle-system", {
                preset: "default",
                color: "#FFD700, #ed1c24, #28a745",
                particleCount: 1000,
                size: 0.1,
                maxAge: 2,
                positionSpread: "1 1 1"
            });

            contenedor.appendChild(confeti);

            // Se elimina después de 4 segundos para mantener limpia la escena
            setTimeout(() => {
                if (confeti.parentNode) contenedor.removeChild(confeti);
            }, 4000);
        });
    };

    // Activar Cámara
    btnAr.addEventListener("click", () => {
        document.getElementById("ar-wrapper").style.display = "block";
        document.getElementById("controles-ar").style.display = "flex";
        if (sceneEl.systems["mindar-image-system"]) sceneEl.systems["mindar-image-system"].start();
        btnAr.style.display = "none";
    });

    // Función Universal de Animación e Info
    const ejecutarAccion = (clip, mostrarInfo) => {
        document.querySelectorAll(".modelo-ar").forEach(m => {
            m.setAttribute('animation-mixer', `clip: ${clip}; loop: repeat; crossFadeDuration: 0.4`);
            fixModel(m);
        });

        document.querySelectorAll(".info-panel").forEach(p => {
            p.setAttribute('visible', mostrarInfo);
        });
    };

    // Eventos de Botones
    document.getElementById('btn-aplaudir').addEventListener('click', () => {
        lanzarConfeti(); // El confeti sale siempre
        ejecutarAccion("APLAUDIR_MEXICO", false);
    });

    document.getElementById('btn-saludar').addEventListener('click', () => {
        ejecutarAccion("SALUDAR_MEXICO", true);
    });

    document.getElementById('btn-limpiar').addEventListener('click', () => {
        document.querySelectorAll(".modelo-ar").forEach(m => m.removeAttribute('animation-mixer'));
        document.querySelectorAll(".info-panel").forEach(p => p.setAttribute('visible', false));
    });

    // Swiper
    new Swiper(".mySwiper", { pagination: { el: ".swiper-pagination", clickable: true } });
});
</script>
